namespace: kyverno
roleName: argocd-manager-kyverno-policies
rules:
  - apiGroups: ['']
    resources: [pods, pods/log]
    verbs: [get, list]

  - apiGroups: ['']
    resources: [serviceaccounts]
    verbs: [create, patch, get]

  - apiGroups: [kyverno.io]
    resources: [policyexceptions]
    verbs: [create, update, patch, get, list, watch]

clusterRules:
  - apiGroups: [kyverno.io]
    resources: [clusterpolicies, clusterpolicies/status, clustercleanuppolicies, clustercleanuppolicies/status]
    verbs: [create, update, patch, get, list, watch]

  - apiGroups: [policies.kyverno.io]
    resources: [validatingpolicies, validatingpolicies/status, namespacedvalidatingpolicies, namespacedvalidatingpolicies/status]
    verbs: [create, update, patch, get, list, watch]
