appName: k8s-spb2-backend1-vault-operator
namespace: vault-secrets-operator-system
serviceAccountName: argocd-manager
serviceAccountNamespace: kube-system
roleName: argocd-manager-vault-operator
rules:
- apiGroups: [apps]
  resources: [deployments, replicasets]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: ['']
  resources: [serviceaccounts, services, configmaps, secrets]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [rbac.authorization.k8s.io]
  resources: [roles, rolebindings]
  verbs: [get, list, create, update, patch]

- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [ricoberger.de]
  resources: [vaultsecrets]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [monitoring.coreos.com]
  resources: [servicemonitors]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [operator.victoriametrics.com]
  resources: [vmservicescrapes]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [authentication.k8s.io]
  resources: [tokenreviews]
  verbs: [create]

- apiGroups: [authorization.k8s.io]
  resources: [subjectaccessreviews]
  verbs: [create]

markerRole:
  enabled: true
