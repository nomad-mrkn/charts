appName: k8s-spb2-backend1-fluent-bit
namespace: fluent-bit
serviceAccountName: argocd-manager
serviceAccountNamespace: kube-system
roleName: argocd-manager-fluent-bit
rules:
- apiGroups: [apps]
  resources: [daemonsets]
  verbs: [create, update, patch, get, list, watch, delete]

# Deploy resources
- apiGroups: [""]
  resources: [serviceaccounts, services, configmaps, secrets]
  verbs: [create, update, patch, get, list, watch, delete]

- apiGroups: [""]
  resources: [namespaces]
  verbs: [create, get, list, watch]

# RBAC escalation: fluent-bit ClusterRole needs these to read logs
- apiGroups: [""]
  resources: [pods, namespaces]
  verbs: [get, list, watch]

# Optional: only if rbac.nodeAccess=true
- apiGroups: [""]
  resources: [nodes, nodes/proxy]
  verbs: [get, list, watch]

# Fluent-bit chart creates ClusterRole/ClusterRoleBinding
- apiGroups: [rbac.authorization.k8s.io]
  resources: [clusterroles, clusterrolebindings]
  verbs: [get, list, create, update, patch, delete]

- apiGroups: [monitoring.coreos.com]
  resources: [servicemonitors, prometheusrules]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [networking.k8s.io]
  resources: [networkpolicies]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [policy]
  resources: [podsecuritypolicies]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [autoscaling.k8s.io]
  resources: [verticalpodautoscalers]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [batch]
  resources: [jobs]
  verbs: [create, list, get, watch, update]

