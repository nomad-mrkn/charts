namespace: velero
roleName: argocd-manager-velero
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [create, get, list, watch]

  - apiGroups: [apps]
    resources: [deployments, daemonsets]
    verbs: [create, update, patch, get, list, watch]

  - apiGroups: [""]
    resources: [serviceaccounts, services, configmaps, secrets, pods, pods/log]
    verbs: [create, update, patch, get, list, watch]

  - apiGroups: [batch]
    resources: [jobs]
    verbs: [create, update, patch, get, list, watch]

  - apiGroups: [velero.io]
    resources: [backupstoragelocations, volumesnapshotlocations, schedules]
    verbs: [create, update, patch, get, list, watch]

  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles, clusterrolebindings, roles, rolebindings]
    verbs: [get, list, create, update, patch, bind, escalate]

  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [create, update, patch, get, list, watch]

  - apiGroups: [operator.victoriametrics.com]
    resources: [vmservicescrapes]
    verbs: [create, update, patch, get, list, watch]

  - apiGroups: [ricoberger.de]
    resources: [vaultsecrets]
    verbs: [create, update, patch, get, list, watch]
