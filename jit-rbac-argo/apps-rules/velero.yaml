appName: k8s-spb2-backend1-velero
namespace: velero
serviceAccountName: argocd-manager
serviceAccountNamespace: kube-system
roleName: argocd-manager-velero
rules:
- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [apps]
  resources: [deployments, daemonsets, replicasets]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: ['']
  resources: [serviceaccounts, services, configmaps, secrets]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [rbac.authorization.k8s.io]
  resources: [roles, rolebindings]
  verbs: [get, list, create, update, patch]

- apiGroups: [batch]
  resources: [jobs, cronjobs]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [velero.io]
  resources: [backups, restores, backupstoragelocations, volumesnapshotlocations, schedules, downloadrequests, deletebackuprequests, podvolumebackups, podvolumerestores, serverstatusrequests]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [monitoring.coreos.com]
  resources: [servicemonitors, prometheusrules]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [operator.victoriametrics.com]
  resources: [vmservicescrapes]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: ['*']
  resources: ['*']
  verbs: ['*']

