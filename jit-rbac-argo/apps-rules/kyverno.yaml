appName: k8s-spb2-backend1-kyverno
namespace: kyverno
serviceAccountName: argocd-manager
serviceAccountNamespace: kube-system
roleName: argocd-manager-kyverno
rules:
- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [""]
  resources: [serviceaccounts, services, configmaps, secrets, pods, pods/log]
  verbs: [create, update, patch, get, list, watch, delete]

- apiGroups: [apps]
  resources: [deployments]
  verbs: [create, update, patch, get, list, watch, delete]

# Kyverno creates 13 ClusterRoles + 4 Roles
- apiGroups: [rbac.authorization.k8s.io]
  resources: [clusterroles, clusterrolebindings, roles, rolebindings]
  verbs: [get, list, create, update, patch, delete]

- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [create, update, patch, get, list, watch, delete]

- apiGroups: [admissionregistration.k8s.io]
  resources: [mutatingwebhookconfigurations, validatingwebhookconfigurations]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [flowcontrol.apiserver.k8s.io]
  resources: [prioritylevelconfigurations, flowschemas]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [policy]
  resources: [poddisruptionbudgets]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [networking.k8s.io]
  resources: [networkpolicies]
  verbs: [create, update, patch, get, list, watch]

- apiGroups: [batch]
  resources: [jobs, cronjobs]
  verbs: [create, update, patch, get, list, watch]

# --- Runtime permissions (NOT needed for deploy) ---
# Kyverno CRDs are used by kyverno itself, not by ArgoCD during deploy
# - apiGroups: [kyverno.io]
#   resources: [policies, policies/status, clusterpolicies, clusterpolicies/status, updaterequests, updaterequests/status, cleanuppolicies, clustercleanuppolicies, globalcontextentries, globalcontextentries/status,
#     admissionreports, clusteradmissionreports, backgroundscanreports, clusterbackgroundscanreports, policyexceptions]
#   verbs: [create, update, patch, get, list, watch]

# - apiGroups: [reports.kyverno.io]
#   resources: [ephemeralreports, clusterephemeralreports]
#   verbs: [create, update, patch, get, list, watch]

- apiGroups: [monitoring.coreos.com]
  resources: [servicemonitors]
  verbs: [create, update, patch, get, list, watch]

