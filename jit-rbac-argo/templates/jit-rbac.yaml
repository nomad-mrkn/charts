{{- if .Values.clusterRules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.roleName }}
  annotations:
    {{- include "jit-helm.jitAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
rules:
{{- toYaml .Values.clusterRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.roleName }}
  annotations:
    {{- include "jit-helm.jitAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.roleName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName }}
    namespace: {{ .Values.serviceAccountNamespace }}
{{- end }}
{{- if .Values.rules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.roleName }}
  namespace: {{ .Values.namespace }}
  annotations:
    {{- include "jit-helm.jitAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
rules:
{{- toYaml .Values.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.roleName }}
  namespace: {{ .Values.namespace }}
  annotations:
    {{- include "jit-helm.jitAnnotations" . | nindent 4 }}
  labels:
    {{- include "jit-helm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.roleName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName }}
    namespace: {{ .Values.serviceAccountNamespace }}
{{- end }}
