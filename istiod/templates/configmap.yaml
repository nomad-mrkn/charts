{{- define "mesh" }}
    # The trust domain corresponds to the trust root of a system.
    # Refer to https://github.com/spiffe/spiffe/blob/master/standards/SPIFFE-ID.md#21-trust-domain
    trustDomain: "cluster.local"

    # The namespace to treat as the administrative root namespace for Istio configuration.
    # When processing a leaf namespace Istio will search for declarations in that namespace first
    # and if none are found it will search in the root namespace. Any matching declaration found in the root namespace
    # is processed as if it were declared in the leaf namespace.
    rootNamespace: {{ .Values.meshConfig.rootNamespace | default .Values.global.istioNamespace }}

  {{ $prom := include "default-prometheus" . | eq "true" }}
  {{ $sdMetrics := include "default-sd-metrics" . | eq "true" }}
  {{ $sdLogs := include "default-sd-logs" . | eq "true" }}
  {{- if or $prom $sdMetrics $sdLogs }}
    defaultProviders:
    {{- if or $prom $sdMetrics }}
      metrics:
      {{ if $prom }}- prometheus{{ end }}
      {{ if and $sdMetrics $sdLogs }}- stackdriver{{ end }}
    {{- end }}
      accessLogging:
      - waypoint-logs-json
    {{- if and $sdMetrics $sdLogs }}
      - stackdriver
    {{- end }}
  {{- end }}

    defaultConfig:
      {{- if .Values.global.meshID }}
      meshId: "{{ .Values.global.meshID }}"
      {{- end }}
      {{- with (.Values.global.proxy.variant | default .Values.global.variant) }}
      image:
        imageType: {{. | quote}}
      {{- end }}
      {{- if not (eq .Values.global.proxy.tracer "none") }}
      tracing:
      {{- if eq .Values.global.proxy.tracer "lightstep" }}
        lightstep:
          # Address of the LightStep Satellite pool
          address: {{ .Values.global.tracer.lightstep.address }}
          # Access Token used to communicate with the Satellite pool
          accessToken: {{ .Values.global.tracer.lightstep.accessToken }}
      {{- else if eq .Values.global.proxy.tracer "zipkin" }}
        zipkin:
          # Address of the Zipkin collector
          address: {{ ((.Values.global.tracer).zipkin).address | default (print "zipkin." .Values.global.istioNamespace ":9411") }}
      {{- else if eq .Values.global.proxy.tracer "datadog" }}
        datadog:
          # Address of the Datadog Agent
          address: {{ ((.Values.global.tracer).datadog).address | default "$(HOST_IP):8126" }}
      {{- else if eq .Values.global.proxy.tracer "stackdriver" }}
        stackdriver:
          # enables trace output to stdout.
          debug: {{ (($.Values.global.tracer).stackdriver).debug | default "false" }}
          # The global default max number of attributes per span.
          maxNumberOfAttributes: {{ (($.Values.global.tracer).stackdriver).maxNumberOfAttributes | default "200" }}
          # The global default max number of annotation events per span.
          maxNumberOfAnnotations: {{ (($.Values.global.tracer).stackdriver).maxNumberOfAnnotations | default "200" }}
          # The global default max number of message events per span.
          maxNumberOfMessageEvents: {{ (($.Values.global.tracer).stackdriver).maxNumberOfMessageEvents | default "200" }}
      {{- end }}
      {{- end }}
      {{- if .Values.global.remotePilotAddress }}
      {{- if and .Values.istiodRemote.enabled .Values.istiodRemote.enabledLocalInjectorIstiod }}
      #  only primary `istiod` to xds and local `istiod` injection installs.
      discoveryAddress: {{ printf "istiod-remote.%s.svc" .Release.Namespace }}:15012
      {{- else }}
      discoveryAddress: {{ printf "istiod.%s.svc" .Release.Namespace }}:15012
      {{- end }}
      {{- else }}
      discoveryAddress: istiod{{- if not (eq .Values.revision "") }}-{{ .Values.revision }}{{- end }}.{{.Release.Namespace}}.svc:15012
      {{- end }}
    extensionProviders:
    - name: waypoint-logs-json
      envoyFileAccessLog:
        path: /dev/stdout
        logFormat:
          labels:
            delivery_info:
              type: envoy-proxy
              subtype: waypoint
              content_type: access
            connection:
              id: '%CONNECTION_ID%'
              stream_id: '%STREAM_ID%'
              unique_id: '%UNIQUE_ID%'
              access_log_type: '%ACCESS_LOG_TYPE%'
            backend:
              name: '%UPSTREAM_CLUSTER_RAW%'
            bytes:
              received: '%DOWNSTREAM_WIRE_BYTES_RECEIVED%'
              sent: '%DOWNSTREAM_WIRE_BYTES_SENT%'
              request_body: '%BYTES_RECEIVED%'
              request_headers: '%REQUEST_HEADERS_BYTES%'
              response_body: '%BYTES_SENT%'
              response_headers: '%RESPONSE_HEADERS_BYTES%'
              upstream_sent: '%UPSTREAM_WIRE_BYTES_SENT%'
              upstream_received: '%UPSTREAM_WIRE_BYTES_RECEIVED%'
              upstream_headers_sent: '%UPSTREAM_HEADER_BYTES_SENT%'
              upstream_headers_received: '%UPSTREAM_HEADER_BYTES_RECEIVED%'
            frontend:
              ip: '%DOWNSTREAM_LOCAL_ADDRESS_WITHOUT_PORT%'
              port: '%DOWNSTREAM_LOCAL_PORT%'
              direct_ip: '%DOWNSTREAM_DIRECT_LOCAL_ADDRESS_WITHOUT_PORT%'
              direct_port: '%DOWNSTREAM_DIRECT_LOCAL_PORT%'
              name: '%FILTER_CHAIN_NAME%'
              requested_host: '%REQ(:AUTHORITY)%'
              ssl_ciphers: '%DOWNSTREAM_TLS_CIPHER%'
              ssl_version: '%DOWNSTREAM_TLS_VERSION%'
              tls_ja3: '%TLS_JA3_FINGERPRINT%'
              tls_ja4: '%TLS_JA4_FINGERPRINT%'
              local_san: '%DOWNSTREAM_LOCAL_URI_SAN%'
              peer_san: '%DOWNSTREAM_PEER_URI_SAN%'
              peer_subject: '%DOWNSTREAM_PEER_SUBJECT%'
              peer_issuer: '%DOWNSTREAM_PEER_ISSUER%'
              peer_fingerprint: '%DOWNSTREAM_PEER_FINGERPRINT_256%'
              tls_session_id: '%DOWNSTREAM_TLS_SESSION_ID%'
              local_subject: '%DOWNSTREAM_LOCAL_SUBJECT%'
              peer_serial: '%DOWNSTREAM_PEER_SERIAL%'
              peer_cert_expiry: '%DOWNSTREAM_PEER_CERT_V_END%'
            headers:
              baggage: '%REQ(baggage)%'
              connection: '%REQ(connection)%'
              traceparent: '%REQ(traceparent)%'
              upgrade: '%REQ(upgrade)%'
              user-agent: '%REQ(user-agent)%'
              x-request-id: '%REQ(x-request-id)%'
              x-client-id: '%REQ(x-client-id?x-client-service)%'
              x-client-version: '%REQ(x-client-version)%'
              x-forwarded-for: '%REQ(x-forwarded-for)%'
              x-forwarded-host: '%REQ(x-forwarded-host)%'
              x-forwarded-path: '%REQ(x-forwarded-path)%'
              x-forwarded-port: '%REQ(x-forwarded-port)%'
              x-forwarded-proto: '%REQ(x-forwarded-proto)%'
              x-forwarded-uri-pattern: '%REQ(x-forwarded-uri-pattern)%'
              resp-x-envoy-upstream-service-time: '%RESP(x-envoy-upstream-service-time)%'
            network:
              client_ip: '%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%'
              client_port: '%DOWNSTREAM_REMOTE_PORT%'
              direct_client_ip: '%DOWNSTREAM_DIRECT_REMOTE_ADDRESS_WITHOUT_PORT%'
              direct_client_port: '%DOWNSTREAM_DIRECT_REMOTE_PORT%'
            okko:
              eid: '%REQ(eid)%'
              nid: '%REQ(x-jwt-nid?nid)%'
              odid: '%REQ(odid)%'
              osid: '%REQ(osid)%'
              otid: '%REQ(otid)%'
              otu: '%REQ(otu)%'
              session_expiry: '%REQ(x-jwt-expiry?okko-session-expiry)%'
              session_id: '%REQ(x-jwt-session-id?okko-session-id)%'
              session_token: '%REQ(okko-session-token)%'
              uid: '%REQ(x-jwt-uid?uid)%'
              wid: '%REQ(wid)%'
            process:
              hostname: '%HOSTNAME%'
            request:
              host: '%REQ(:AUTHORITY)%'
              method: '%REQ(:METHOD)%'
              protocol: '%PROTOCOL%'
              uri: '%PATH(NQ:ORIG_OR_PATH)%'
              uri_with_query: '%PATH(WQ:ORIG_OR_PATH)%'
              uri_pattern: '%REQ(x-uri-pattern)%'
            response:
              status: '%RESPONSE_CODE%'
              code_details: '%RESPONSE_CODE_DETAILS%'
              termination_state: '%RESPONSE_FLAGS%'
              flags_long: '%RESPONSE_FLAGS_LONG%'
              custom_flags: '%CUSTOM_FLAGS%'
              connection_termination: '%CONNECTION_TERMINATION_DETAILS%'
              grpc_status: '%GRPC_STATUS_NUMBER%'
              grpc_status_name: '%GRPC_STATUS(CAMEL_STRING)%'
              grpc_message: '%TRAILER(grpc-message)%'
              local_reply_body: '%LOCAL_REPLY_BODY%'
              rbac_hint: '%METADATA(DYNAMIC:envoy.filters.http.rbac:access_log_hint)%'
            routing:
              route_name: '%ROUTE_NAME%'
              virtual_cluster: '%VIRTUAL_CLUSTER_NAME%'
            time:
              total: '%DURATION%'
              request_receive_time: '%REQUEST_DURATION%'
              request_send_time: '%REQUEST_TX_DURATION%'
              upstream_queue_time: '%UPSTREAM_CONNECTION_POOL_READY_DURATION%'
              upstream_connect_time: '%COMMON_DURATION(US_CX_BEG:US_CX_END:ms)%'
              upstream_response_time: '%RESPONSE_DURATION%'
              response_send_time: '%RESPONSE_TX_DURATION%'
              downstream_handshake: '%DOWNSTREAM_HANDSHAKE_DURATION%'
              upstream_time_to_first_byte: '%COMMON_DURATION(US_RX_BEG:US_RX_BODY_BEG:ms)%'
              upstream_receive_time: '%COMMON_DURATION(US_RX_BEG:US_RX_END:ms)%'
              upstream_send_time: '%COMMON_DURATION(US_TX_BEG:US_TX_END:ms)%'
              downstream_send_time: '%COMMON_DURATION(DS_TX_BEG:DS_TX_END:ms)%'
            timehuman: '%START_TIME_LOCAL(%Y-%m-%dT%H:%M:%S.%3f%z)%'
            timestamp: '%START_TIME(%s.%3f)%'
            tracing:
              trace_id: '%TRACE_ID%'
              traceparent: '%REQ(traceparent)%'
            upstream:
              addr: '%UPSTREAM_HOST%'
              local_addr: '%UPSTREAM_LOCAL_ADDRESS%'
              connection_id: '%UPSTREAM_CONNECTION_ID%'
              name: '%UPSTREAM_CLUSTER_RAW%'
              protocol: '%UPSTREAM_PROTOCOL%'
              response_status: '%RESPONSE_CODE%'
              attempt_count: '%UPSTREAM_REQUEST_ATTEMPT_COUNT%'
              tls_cipher: '%UPSTREAM_TLS_CIPHER%'
              tls_version: '%UPSTREAM_TLS_VERSION%'
              peer_san: '%UPSTREAM_PEER_URI_SAN%'
              peer_subject: '%UPSTREAM_PEER_SUBJECT%'
              peer_issuer: '%UPSTREAM_PEER_ISSUER%'
              peer_cert_expiry: '%UPSTREAM_PEER_CERT_V_END%'
              transport_failure: '%UPSTREAM_TRANSPORT_FAILURE_REASON%'
{{- end }}

{{/* We take the mesh config above, defined with individual values.yaml, and merge with .Values.meshConfig */}}
{{/* The intent here is that meshConfig.foo becomes the API, rather than re-inventing the API in values.yaml */}}
{{- $originalMesh := include "mesh" . | fromYaml }}
{{- $mesh := mergeOverwrite $originalMesh .Values.meshConfig }}

{{- if or (eq .Values.global.resourceScope "all") (eq .Values.global.resourceScope "namespace") }}
{{- if .Values.configMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: istio{{- if not (eq .Values.revision "") }}-{{ .Values.revision }}{{- end }}
  namespace: {{ .Release.Namespace }}
  labels:
    istio.io/rev: {{ .Values.revision | default "default" | quote }}
    install.operator.istio.io/owning-resource: {{ .Values.ownerName | default "unknown" }}
    operator.istio.io/component: "Pilot"
    release: {{ .Release.Name }}
    app.kubernetes.io/name: "istiod"
    {{- include "istio.labels" . | nindent 4 }}
data:

  # Configuration file for the mesh networks to be used by the Split Horizon EDS.
  meshNetworks: |-
  {{- if .Values.global.meshNetworks }}
    networks:
{{ toYaml .Values.global.meshNetworks | trim | indent 6 }}
  {{- else }}
    networks: {}
  {{- end }}

  mesh: |-
{{- if .Values.meshConfig }}
{{ $mesh | toYaml | indent 4 }}
{{- else }}
{{- include "mesh" . }}
{{- end }}
---
{{- end }}
{{- end }}
