_internal_defaults_do_not_set:
  annotations: {}
  caAddress: ""
  env: {}
  hub: docker.io/istio
  image: ztunnel
  imagePullPolicy: ""
  imagePullSecrets: []
  istioNamespace: istio-system
  labels: {}
  logAsJson: true
  logLevel: info
  meshConfig:
    defaultConfig:
      proxyMetadata: {}
  multiCluster:
    clusterName: ""
  network: ""
  podAnnotations:
    prometheus.io/port: "15020"
    prometheus.io/scrape: "true"
  podLabels: {}
  resourceName: ""
  resourceQuotas:
    enabled: false
    pods: 5000
  resourceScope: all
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
  revision: ""
  seLinuxOptions: {}
  tag: 1.28.0
  terminationGracePeriodSeconds: 30
  tolerations:
  - effect: NoSchedule
    operator: Exists
  - key: CriticalAddonsOnly
    operator: Exists
  - effect: NoExecute
    operator: Exists
  updateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  variant: ""
  volumeMounts: []
  volumes: []
  xdsAddress: ""
