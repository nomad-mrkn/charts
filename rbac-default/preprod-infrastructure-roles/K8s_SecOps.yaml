K8s_SecOps_role:
  - kind: ClusterRole
    name: K8s_SecOps
    rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs:
      - get
      - list
      - watch
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs:
      - get
      - list
      - watch 
      - patch
    - apiGroups: [""]
      resources: ["pods/exec"]
      verbs:
      - get
      - list
      - watch
      - create

K8s_SecOps_rolebinding:
  - kind: ClusterRoleBinding
    name: K8s_SecOps
    subjects:
    - kind: Group
      ldapGroup: K8s_preprod_SecOps
    roleRef:
      kind: ClusterRole
      name: K8s_SecOps