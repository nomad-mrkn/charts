k8s_Runtime_L2_Role:
  - kind: ClusterRole
    name: K8s_Runtime_L2
    rules:
    # core
    - apiGroups: [""] 
      resources: 
      - pods
      - pods/exec
      - pods/log
      - pods/attach
      - pods/portforward
      - services
      - services/status
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
      - events
      - configmaps
      - secrets
      - serviceaccounts
      - limitranges
      - resourcequotas
      - namespaces
      - namespaces/status
      - nodes
      - nodes/spec
      - nodes/log
      - nodes/status
      - nodes/metrics
      - nodes/proxy
      verbs: 
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    - apiGroups: ["apps"]
      resources:
      - deployments
      - deployments/status
      - statefulsets
      - statefulsets/status
      - daemonsets
      - daemonsets/status
      - replicasets
      - replicasets/status
      - controllerrevisions
      verbs:  
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    - apiGroups: ["batch"]
      resources:
      - jobs
      - jobs/status
      - cronjobs
      - cronjobs/status
      verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    - apiGroups: ["networking.k8s.io"]
      resources:
      - ingresses
      - ingresses/status
      - networkpolicies
      - adminnetworkpolicies
      - gateways
      verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    - apiGroups: ["ingress.v1.haproxy.org"]
      resources: 
      - backends
      - defaults
      - tcps
      verbs: 
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      
    - apiGroups: ["autoscaling"]
      resources:
      - horizontalpodautoscalers
      - horizontalpodautoscalers/status
      verbs: 
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    - apiGroups: ["autoscaling.k8s.io"]
      resources:
      - verticalpodautoscalers
      - verticalpodautoscalers/status
      verbs: 
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    # custome resources
    - apiGroups: ["apiextensions.k8s.io"]
      resources:
      - customresourcedefinitions
      verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    - apiGroups: ["networking.istio.io"]
      resources: 
      - virtualservices
      - gateways
      - destinationrules
      - envoyfilters
      - peerauthentications
      - serviceentries
      - sidecars
      - workloadentries
      - workloadgroups
      verbs:
      - get
      - list
      - watch
      - update
      - patch
      - delete
      - create

    - apiGroups: ["security.istio.io"]
      resources: 
      - authorizationpolicies
      - peerauthentications
      - requestauthentications
      verbs:
      - get
      - list
      - watch
      - update
      - patch
      - delete
      - create

    - apiGroups: ["telemetry.istio.io"]
      resources: 
      - telemetries
      verbs:
      - get
      - list
      - watch
      - update
      - patch
      - delete
      - create

    - apiGroups: ["extensions.istio.io"]
      resources:
      - wasmplugins
      verbs:
      - get
      - list
      - watch
      - update
      - patch
      - delete
      - create

    - apiGroups: ["gateway.networking.k8s.io"]
      resources:
      - gatewayclasses
      - gateways
      - gateways/status
      - httproutes
      - httproutes/status
      - grpcroutes
      - grpcroutes/status
      - tcproutes
      - tcproutes/status
      - tlsroutes
      - tlsroutes/status
      - referencegrants
      - backendtlspolicies
      - backendtlspolicies/status
      verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

    - apiGroups: ["keda.sh"]
      resources: 
      - scaledobjects
      - scaledjobs
      - clustertriggerauthentications
      - triggerauthentications
      verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

 
    - apiGroups: ["policy.linkerd.io"]
      resources:
      - authorizationpolicies
      - egressnetworks
      - externalworkloads
      - httplocalratelimitpolicies
      - httproutes
      - meshtlsauthentications
      - networkauthentications
      - serverauthorizations
      - servers
      - serviceprofiles
      verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

K8s_Runtime_L2_rolebinding:
  - kind: ClusterRoleBinding
    name: K8s_Runtime_L2
    subjects:
    - kind: Group
      ldapGroup: K8s_preprod_Runtime_L2
    roleRef:
      kind: ClusterRole  
      name: K8s_Runtime_L2