# read only (крмое секретов) + pods/exec, но группа зажата куверно в рамках определенного пода.
K8s_SysOps_role:
  - kind: ClusterRole
    name: K8s_SysOps
    rules:
  # core
    - apiGroups: [""] 
      resources: 
      - pods
      - pods/log
      - pods/exec
      - services
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
      - events
      - configmaps
      - serviceaccounts
      - limitranges
      - resourcequotas
      - namespaces
      - nodes
      - nodes/spec
      - nodes/log
      - nodes/status
      - nodes/metrics
      verbs: 
      - get
      - list
      - watch

    - apiGroups: [""] 
      resources: 
      - pods/exec
      verbs: 
      - get
      - list
      - watch
      - create

    - apiGroups: ["apps"]
      resources:
      - deployments
      - deployments/status
      - statefulsets
      - statefulsets/status
      - daemonsets
      - daemonsets/status
      - replicasets
      - replicasets/status
      - controllerrevisions
      verbs:  
      - get
      - list
      - watch

    - apiGroups: ["batch"]
      resources:
      - jobs
      - jobs/status
      - cronjobs
      - cronjobs/status
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["networking.k8s.io"]
      resources:
      - ingresses
      - ingresses/status
      - networkpolicies
      - adminnetworkpolicies
      - gateways
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["ingress.v1.haproxy.org"]
      resources: 
      - backends
      - defaults
      - tcps
      verbs: 
      - get
      - list
      - watch

    - apiGroups: ["rbac.authorization.k8s.io"]
      resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["storage.k8s.io"]
      resources:
      - storageclasses
      - volumeattachments
      - csinodes
      verbs:  
      - get
      - list
      - watch

    - apiGroups: ["coordination.k8s.io"]
      resources:
      - leases
      verbs:  
      - get
      - list
      - watch

    - apiGroups: ["metrics.k8s.io"]
      resources: 
      - pods
      - nodes
      verbs:  
      - get
      - list
      - watch
      
    - apiGroups: ["admissionregistration.k8s.io"]
      resources: 
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
      verbs:  
      - get
      - list
      - watch

    - apiGroups: ["certificates.k8s.io"]
      resources:
      - certificatesigningrequests
      - certificatesigningrequests/status
      - certificatesigningrequests/approval
      - signers
      verbs:
      - get
      - list
      - watch


    - apiGroups: ["autoscaling"]
      resources:
      - horizontalpodautoscalers
      - horizontalpodautoscalers/status
      verbs: 
      - get
      - list
      - watch

    - apiGroups: ["autoscaling.k8s.io"]
      resources:
      - verticalpodautoscalers
      - verticalpodautoscalers/status
      verbs: 
      - get
      - list
      - watch

    # custome resources
    - apiGroups: ["apiextensions.k8s.io"]
      resources:
      - customresourcedefinitions
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["networking.istio.io"]
      resources: 
      - virtualservices
      - gateways
      - destinationrules
      - envoyfilters
      - peerauthentications
      - serviceentries
      - sidecars
      - workloadentries
      - workloadgroups
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["security.istio.io"]
      resources: 
      - authorizationpolicies
      - peerauthentications
      - requestauthentications
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["telemetry.istio.io"]
      resources: 
      - telemetries
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["extensions.istio.io"]
      resources:
      - wasmplugins
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["ricoberger.de"]
      resources: 
      - vaultsecrets
      - cassandra-vault-secrets
      verbs: 
      - get
      - list
      - watch

    - apiGroups: ["operator.victoriametrics.com"]
      resources: 
      - vmservicescrapes
      - vmpodscrapes
      - vmagents
      - vmalertmanagerconfigs
      - vmalertmanagers
      - vmalerts
      - vmauths
      - vmclusters
      - vmnodescrapes
      - vmprobes
      - vmrules
      - vmscrapeconfigs
      - vmsingles
      - vmstaticscrapes
      - vmusers
      verbs: 
      - get
      - list
      - watch

    - apiGroups: ["keda.sh"]
      resources: 
      - scaledobjects
      - scaledjobs
      - clustertriggerauthentications
      - triggerauthentications
      verbs:
      - get
      - list
      - watch

    - apiGroups: ["monitoring.coreos.com"]
      resources: 
      - servicemonitors
      verbs: 
      - get
      - list
      - watch

    - apiGroups: ["wgpolicyk8s.io"]
      resources: 
      - clusterpolicyreports
      - policyreports
      verbs: 
      - get
      - list
      - watch

    - apiGroups: ["policy.linkerd.io"]
      resources:
      - authorizationpolicies
      - egressnetworks
      - externalworkloads
      - httplocalratelimitpolicies
      - httproutes
      - meshtlsauthentications
      - networkauthentications
      - serverauthorizations
      - servers
      - serviceprofiles
      verbs:
      - get
      - list
      - watch

K8s_SysOps_rolebinding:
  - kind: ClusterRoleBinding
    name: K8s_SysOps
    subjects:
    - kind: Group
      ldapGroup: K8s_preprod_SysOps
    roleRef:
      kind: ClusterRole  
      name: K8s_SysOps