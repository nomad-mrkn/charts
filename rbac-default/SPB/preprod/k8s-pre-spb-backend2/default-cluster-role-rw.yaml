role_default:
  - kind: ClusterRole
    name: default-cluster-role-rw
    rules:
      - apiGroups: 
          - "apps"
        resources:
          - "deployments" 
          - "replicasets"
        verbs:
          - "get" 
          - "list"
          - "watch"
      - apiGroups:
          - ""
        resources:
          - "configmaps"
        verbs:
          - "get"
          - "list"
          - "watch"
          - "create"
          - "update"
          - "patch"
          - "delete"
      - apiGroups:
          - ""
        resources:
          - "pods"
        verbs:
          - "get" 
          - "list"
          - "watch"
          - "delete"
      - apiGroups:
          - ""
        resources: 
          - "pods/log"
        verbs:
          - "get"