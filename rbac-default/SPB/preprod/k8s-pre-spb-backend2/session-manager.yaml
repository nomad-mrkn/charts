session-manager:
  - kind: RoleBinding
    name: session-manager
    namespace: session-manager
    subjects: 
      - kind: Group
        ldapGroup: k8s_pre_ns_session-manager_rw
        apiGroup: rbac.authorization.k8s.io
    roleRef:
      kind: Role  
      name: session-manager
      apiGroup: rbac.authorization.k8s.io

sessionmanager_role:
  - kind: Role
    name: session-manager
    namespace: session-manager
    rules:
      - apiGroups: 
          - "apps"
        resources:
          - "deployments" 
          - "replicasets"
        verbs:
          - "get"
          - "update"
          - "patch"
          - "list"
          - "watch"
      - apiGroups:
          - ""
        resources:
          - "configmaps"
        verbs:
          - "get"
          - "list"
          - "watch"
          - "create"
          - "update"
          - "patch"
          - "delete"
      - apiGroups:
          - ""
        resources:
          - "pods"
        verbs:
          - "get" 
          - "list"
          - "watch"
          - "delete"
      - apiGroups:
          - ""
        resources: 
          - "pods/log"
        verbs:
          - "get"