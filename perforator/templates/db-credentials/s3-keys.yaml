{{- if (and .Values.databases.s3.secretKey .Values.databases.s3.accessKey) -}}
apiVersion: v1
data:
  Secret-key: {{ .Values.databases.s3.secretKey | b64enc | quote }}
  Access-key: {{ .Values.databases.s3.accessKey | b64enc | quote }}
kind: Secret
metadata:
  name: {{ include "perforator.fullname" . }}-storage-s3-keys
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
{{- end -}}