apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: {{ template "name" . }}
  namespace: {{ .Release.Namespace }}
spec:
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  selector:
    matchLabels:
      k8s-app: {{ template "name" . }}-node
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
